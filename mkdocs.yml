site_name: NorGliders Field Guides
site_description: Operating procedures for NorGliders field instrumentation.
site_url: https://norgliders.github.io/field-guides/

plugins:
  - search
  - print-site:
      add_to_navigation: false

theme:
  name: material
  features:
    - navigation.top
    - navigation.instant 
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: custom
      accent: blue
  logo: assets/logos/UiB-emblem_white.svg

copyright: |
  2026 NorGliders<br>
  Developed by the Geophysical Institute, University of Bergen

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md

  - Vertical Profiling Frame:
      - Overview: microrider-1000/vertical-profiling-frame/index.md
      - Required Equipment: microrider-1000/vertical-profiling-frame/required-equipment.md
      - Mount the Instrument: microrider-1000/vertical-profiling-frame/mounting.md
      - Install the Microstructure Probes: microrider-1000/vertical-profiling-frame/install-probes.md
      - Pre-deployment Checklist: microrider-1000/vertical-profiling-frame/pre-deployment-checklist.md
      - Communications & Download Data: microrider-1000/vertical-profiling-frame/comms.md
      - Cleaning & Storage: microrider-1000/vertical-profiling-frame/storage.md
      - Operating Notes: microrider-1000/vertical-profiling-frame/operational.md
